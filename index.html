<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0078D4" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/azure-data-box.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="/hub-boot.css" />
    <title>Data Box</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1020;
        color: #e8ecff;
      }
      #root {
        min-height: 100%;
        height: 100%;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("tool-hub-theme") || localStorage.getItem("gtm-theme");
        if (t === "dark") document.documentElement.classList.add("dark");
        else if (t === "light") {
          /* classic light */
        } else {
          document.documentElement.classList.add("theme-hub");
        }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function () {
            document.documentElement.classList.add("fonts-loaded");
          });
        } else {
          document.documentElement.classList.add("fonts-loaded");
        }
      })();
    </script>
  </head>
  <body>
    <div id="hub-boot-loader" class="hub-boot-loader--pane" role="status" aria-label="Loading Data Box">
      <div class="hub-boot-orb" aria-hidden="true">
        <span class="hub-boot-orb__ring"></span>
        <span class="hub-boot-orb__ring hub-boot-orb__ring--dash"></span>
        <span class="hub-boot-orb__ring hub-boot-orb__ring--inner"></span>
        <span class="hub-boot-orb__core">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
        </span>
      </div>
    </div>
    <div id="root"></div>
    <script src="/hub-boot-fallback.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
